<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trapezoid for PI</title>
    <script src="/js/pitrapezoid/pitrapezoid.js"></script>
</head>
<body>
    <div>
        <canvas id="Canvas" width="1000" height="1000"></canvas>
    </div>
    
    <div>
        <textarea id="text" placeholder="(Pi = 3.14)" readonly style="resize: none;" disabled></textarea>
        <label for="rectangles">Number of rectangles:</label>
        <input type="range" name="rectangles" id="rectangles" autocomplete="off" min="0" max="1000" step="1" value="100">
 
    </div>
    
</body>
