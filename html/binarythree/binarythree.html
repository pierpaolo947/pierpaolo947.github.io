<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Tree</title>
    <script src="/js/binarythree/binarythree.js" defer> </script>
    <link rel="icon" href="img/favicon.png" />
    <link rel="stylesheet" href="/css/project-dark.css" />

</head>

<body>
    <a class="back-link" href="/index.html"><--</a>
    <h1>Tree</h1>
    <main class="layout">
        <div class="canvas-wrap">
            <canvas id="canvas" height="1000" width="1000"></canvas>
        </div>
        <section class="controls">
            <div class="control-group">
                <label id="recursionLabel" for="recursionInput">Recursion</label>
                <input id="recursionInput" type="range" min="1" max="15" value="2">
            </div>
            <div class="control-group">
                <label id="angleLabel" for="angleInput">Branching angle</label>
                <input id="angleInput" type="range" min="0" max="360" value="30">
            </div>
        </section>
    </main>
</body>

</html>
