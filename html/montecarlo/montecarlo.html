<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte Carlo Sim</title>
    <script src="/js/montecarlo/montecarlo.js" defer></script>
</head>
<body>
    <a href="/index.html"><--</a>
    <h1>Montecarlo Simulation</h1>
    <div>
        <canvas id="Canvas" width="1000" height="1000"></canvas>
    </div>
    <div>
        <textarea id="text" placeholder="(Pi = 3.14)" readonly disabled></textarea>
    <input type="text" id="pointAdder" placeholder="Insert #Points to draw" autocomplete="off">
    <button type="button" id="reset">Reset to initial points</button>
    <div>
        <span>Points:</span>
        <span id="nPoints"></span>
    </div>
    </div>
</body>
